# .github/workflows/build-macos.yml
name: build-macos

on:
  push:
    tags:
      - 'B[0-9]*'

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: macos-arm64
            arch: arm64
          - target: macos-x86_64
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: build
        run: |
          mkdir -p bin
          clang -Wall -Wextra -std=c11 -O2 -Iinclude \
            -arch ${{ matrix.arch }} \
            source/main.c source/engine.c \
            -o bin/icrawl-${{ matrix.target }} \
            -lcurl

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: icrawl-${{ matrix.target }}
          path: bin/icrawl-${{ matrix.target }}
