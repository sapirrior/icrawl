# .github/workflows/build-windows.yml
name: build-windows

on:
  push:
    tags:
      - 'B[0-9]*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: setup msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-curl

      - name: build
        run: |
          mkdir -p bin
          gcc -Wall -Wextra -std=c11 -O2 -Iinclude \
            source/main.c source/engine.c \
            -o bin/icrawl-windows-x86_64.exe \
            -lcurl

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: icrawl-windows-x86_64
          path: bin/icrawl-windows-x86_64.exe
